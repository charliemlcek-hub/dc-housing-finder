name: Deploy Dashboard

# Scraping runs LOCALLY on the Mac via launchd (GHA IPs are blocked by all
# target scrapers). This workflow only deploys the static dashboard to
# GitHub Pages whenever the Mac pushes updated docs/index.html.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/scrape.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
