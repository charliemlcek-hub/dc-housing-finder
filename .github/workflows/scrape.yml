name: Scrape DC Housing

on:
  schedule:
    # Every 3 hours, on the hour
    - cron: '0 */3 * * *'
    # Daily digest at 12:00 UTC (8am ET)
    - cron: '0 12 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run type
        id: run-type
        run: |
          # If this is the 12:00 UTC schedule, it's the daily digest.
          if [[ "${{ github.event.schedule }}" == "0 12 * * *" ]]; then
            echo "kind=digest" >> "$GITHUB_OUTPUT"
          else
            echo "kind=alerts-only" >> "$GITHUB_OUTPUT"
          fi

      - name: Run scraper (daily digest)
        if: steps.run-type.outputs.kind == 'digest'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python main.py

      - name: Run scraper (3-hour alerts-only check)
        if: steps.run-type.outputs.kind == 'alerts-only'
        env:
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DASHBOARD_URL: ${{ secrets.DASHBOARD_URL }}
        run: python main.py --alerts-only

      - name: Commit updated dashboard & DB
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f docs/index.html data/listings.db 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "Update dashboard [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi

  deploy-pages:
    needs: scrape
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deployment
        uses: actions/deploy-pages@v4
